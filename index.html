// ── Detecção de frustração ──────────────────────────────────
function detectFrustration(text) {
  const keywords = [
    'nada funciona','não adianta','desisti','cansado','odeio','nunca','sempre erro',
    'impossível','frustrad','tudo errado','não consigo','tentei tudo','não vale',
    'esforço','estudei muito','perdi','desânimo','inútil','burro','burra'
  ];
  return keywords.some(k => text.toLowerCase().includes(k));
}

// ── Classificação ───────────────────────────────────────────
function classify() {
  const a = state.answers;
  const s = { interpretation: 0, conceptual: 0, execution: 0, emotional: 0 };

  if (a.understanding === 'no')      s.interpretation += 3;
  if (a.understanding === 'partial') s.interpretation += 1.5;
  if (a.concept === 'no')            s.conceptual += 3;
  if (a.concept === 'partial')       s.conceptual += 1.5;
  if (a.execution === 'yes')         s.execution += 3;
  if (a.execution === 'both')      { s.execution += 1.5; s.conceptual += 1; }
  if (a.emotion === 'anxious')       s.emotional += 3;
  if (a.emotion === 'frustrated')    s.emotional += 2;
  if (state.isReconstruction)        s.emotional += 1.5;

  const primary = Object.entries(s).sort((a, b) => b[1] - a[1])[0][0];
  const active   = Object.entries(s).filter(([, v]) => v > 0).map(([k]) => k);
  return { scores: s, primary, active };
}

// ── Funções de navegação ────────────────────────────────────
function fillTrigger(text) {
  document.getElementById('user-input').value = text;
}

function startDiagnosis() {
  const input = document.getElementById('user-input').value.trim();
  if (!input) { document.getElementById('user-input').focus(); return; }

  state.userInput         = input;
  state.answers           = {};
  state.currentQ          = 0;
  state.isReconstruction  = detectFrustration(input);

  document.getElementById('input-phase').style.display     = 'none';
  document.getElementById('diagnosis-phase').style.display = 'block';
  renderQuestion();
}

function selectOption(qid, value, el) {
  state.answers[qid] = value;
  document.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  const qid = questions[state.currentQ].id;
  if (!state.answers[qid]) return;

  state.currentQ++;
  if (state.currentQ < questions.length) {
    renderQuestion();
  } else {
    finishDiagnosis();
  }
}

function finishDiagnosis() {
  document.getElementById('diagnosis-phase').style.display = 'none';
  document.getElementById('loading-phase').style.display   = 'block';
  setTimeout(generateOutput, 1800);
}

function resetApp() {
  state.userInput = ''; state.answers = {}; state.currentQ = 0; state.isReconstruction = false;
  document.getElementById('user-input').value = '';
  document.getElementById('output-phase').style.display   = 'none';
  document.getElementById('output-phase').innerHTML       = '';
  document.getElementById('input-phase').style.display    = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Render pergunta ─────────────────────────────────────────
function renderQuestion() {
  const q        = questions[state.currentQ];
  const progress = (state.currentQ / questions.length) * 100;

  // Tenta atualizar barra de progresso, se existir no HTML
  const bar = document.getElementById('progress-fill');
  if (bar) bar.style.width = progress + '%';

  const container = document.getElementById('question-container');
  if (!container) return;           // segurança: elemento deve existir no HTML

  container.innerHTML = `
    <div class="diagnosis-card">
      <p class="diagnosis-q">${q.q}</p>
      <p class="diagnosis-hint">${q.hint}</p>
      <div class="q-options">
        ${q.options.map(o => `
          <button class="q-option" onclick="selectOption('${q.id}','${o.value}',this)">
            <span class="opt-icon">${o.icon}</span>
            <span class="opt-text">
              <strong>${o.label}</strong>
              <span>${o.sub}</span>
            </span>
          </button>`).join('')}
      </div>
    </div>`;

  const btn = document.getElementById('next-btn');
  if (btn) {
    btn.disabled   = true;
    btn.textContent = state.currentQ === questions.length - 1 ? 'Analisar' : 'Próximo →';
  }
}

// ── Gerar output ────────────────────────────────────────────
function generateOutput() {
  document.getElementById('loading-phase').style.display = 'none';

  const { scores, primary, active } = classify();
  const info = content[primary];

  const labels = { interpretation:'Interpretação', conceptual:'Conceitual', execution:'Execução', emotional:'Emocional' };
  const patternNodes = Object.entries(labels).map(([key, label]) => {
    const s = scores[key];
    let cls = 'pn-inactive';
    if (key === primary)         cls = 'pn-active';
    else if (active.includes(key)) cls = s > 2 ? 'pn-primary' : 'pn-secondary';
    return `<span class="pattern-node ${cls}">${label} ${s > 0 ? '▲' : '○'}</span>`;
  }).join('');

  const reconstructionBanner = state.isReconstruction ? `
    <div class="reconstruction-banner">
      <span>🔁</span>
      <div>
        <strong>Modo Reconstrução Ativado</strong>
        Detectei frustração elevada. Não vou te sobrecarregar com teoria agora.
        Vamos em micro-passos — um de cada vez.
      </div>
    </div>` : '';

  const stepsList = state.isReconstruction
    ? `<div class="micro-steps">
        <div class="micro-step"><div class="micro-dot"></div>Identifique UMA coisa que você consegue fazer nesse assunto — não importa quão pequena.</div>
        <div class="micro-step"><div class="micro-dot"></div>Faça apenas essa coisa. Complete ela. Isso cria evidência de competência.</div>
        <div class="micro-step"><div class="micro-dot"></div>Só então expanda — para a próxima peça, não para o problema inteiro.</div>
      </div>`
    : `<ul class="steps-list">${info.steps.map((s, i) =>
        `<li><span class="step-num">${String(i+1).padStart(2,'0')}</span><span>${s}</span></li>`
      ).join('')}</ul>`;

  const out = document.getElementById('output-phase');
  out.innerHTML = `
    ${reconstructionBanner}
    <div class="output-section">
      <div class="section-label">01 — Padrão detectado</div>
      <span class="failure-badge badge-${primary}">${info.badgeLabel}</span>
      <h3 class="section-title">${info.patternTitle}</h3>
      <p class="section-body">${info.patternBody}</p>
      <div class="pattern-visual">${patternNodes}</div>
    </div>
    <div class="output-section">
      <div class="section-label">02 — O que provavelmente causou o erro</div>
      <p class="section-body">${info.cause}</p>
    </div>
    <div class="output-section">
      <div class="section-label">03 — Explicação adaptada</div>
      <h3 class="section-title">${info.explanationTitle}</h3>
      ${stepsList}
    </div>
    <div class="output-section">
      <div class="section-label">04 — Estratégia sugerida</div>
      <p class="section-body">${info.strategy}</p>
    </div>
    <div class="output-section">
      <div class="section-label">05 — Reframe cognitivo</div>
      <div class="reframe-box">${info.reframe}</div>
    </div>
    <button onclick="resetApp()" class="reset-btn">↩ Analisar outro erro</button>`;

  out.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
