<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neural Map of Failure — NeuroBia Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--deep:#06111f;--ocean:#0a1e35;--surface:rgba(10,30,55,0.65);--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.12);--gold-border:rgba(201,168,76,0.22);--text:#dce8f0;--text-soft:rgba(220,232,240,0.62);--text-muted:rgba(220,232,240,0.32);--white:#f0f4f8;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--deep);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-g{position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(10,40,80,0.95) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 15% 65%,rgba(6,17,31,0.8) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 85% 35%,rgba(15,40,71,0.55) 0%,transparent 70%),linear-gradient(180deg,#06111f 0%,#081828 50%,#06111f 100%);}
.bg-w{position:absolute;inset:0;opacity:0.04;background:repeating-linear-gradient(-45deg,transparent,transparent 90px,rgba(201,168,76,0.4) 90px,rgba(201,168,76,0.4) 91px);animation:wdrift 28s linear infinite;}
@keyframes wdrift{from{transform:translate(0,0);}to{transform:translate(91px,91px);}}
.wrap{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:72px 28px 110px;}
.lang-bar{position:fixed;top:18px;right:22px;z-index:100;display:flex;gap:2px;background:rgba(6,17,31,0.85);border:1px solid var(--gold-border);border-radius:20px;padding:4px 6px;backdrop-filter:blur(10px);}
.lang-btn{font-family:'Jost',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.1em;padding:5px 10px;border-radius:14px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.lang-btn.active{background:var(--gold-dim);color:var(--gold-light);border:1px solid var(--gold-border);}
header{text-align:center;margin-bottom:68px;animation:fup 0.9s ease forwards;}
.lab-tag{font-size:9px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin-bottom:28px;}
h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(2.6rem,7vw,4.4rem);line-height:1.06;color:var(--white);}
h1 em{font-style:italic;color:var(--gold-light);}
.divider{width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto;opacity:0.45;}
.subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.95rem,2.4vw,1.15rem);color:var(--text-soft);line-height:1.75;max-width:440px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--gold-border);border-radius:4px;padding:36px 38px;margin-bottom:18px;backdrop-filter:blur(14px);position:relative;animation:fup 0.6s ease forwards;animation-fill-mode:forwards;}
.card::before{content:'';position:absolute;top:0;left:38px;right:38px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.35;}
.input-prompt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--text-soft);margin-bottom:18px;line-height:1.65;}
textarea{width:100%;background:rgba(6,17,31,0.55);border:1px solid var(--gold-border);border-radius:3px;color:var(--text);font-family:'Jost',sans-serif;font-weight:300;font-size:13px;line-height:1.85;padding:16px 18px;resize:none;min-height:120px;outline:none;transition:border-color 0.3s,box-shadow 0.3s;letter-spacing:0.02em;}
textarea::placeholder{color:var(--text-muted);font-style:italic;}
textarea:focus{border-color:rgba(201,168,76,0.45);box-shadow:0 0 0 3px rgba(201,168,76,0.05);}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 26px;}
.chip{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.05em;padding:6px 14px;border-radius:20px;border:1px solid var(--gold-border);background:transparent;color:var(--text-soft);cursor:pointer;transition:all 0.22s;}
.chip:hover{border-color:var(--gold);color:var(--gold-light);background:var(--gold-dim);}
.btn-gold{display:inline-flex;align-items:center;gap:10px;padding:13px 34px;background:transparent;border:1px solid var(--gold);border-radius:3px;color:var(--gold-light);font-family:'Jost',sans-serif;font-weight:400;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.28s;float:right;}
.btn-gold:hover{background:var(--gold-dim);box-shadow:0 0 22px rgba(201,168,76,0.12);transform:translateY(-1px);}
.btn-gold:disabled{opacity:0.25;cursor:not-allowed;transform:none;}
.cf::after{content:'';display:table;clear:both;}
#diagnosis-phase{display:none;}
.prog-track{height:1px;background:rgba(201,168,76,0.08);margin-bottom:34px;position:relative;}
.prog-fill{height:1px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width 0.55s ease;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 8px var(--gold);}
.q-num{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);opacity:0.55;margin-bottom:10px;}
.q-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.5rem);font-weight:300;line-height:1.38;color:var(--white);margin-bottom:6px;}
.q-hint{font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:26px;line-height:1.6;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:28px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:rgba(6,17,31,0.45);border:1px solid rgba(201,168,76,0.1);border-radius:3px;cursor:pointer;transition:all 0.22s;text-align:left;color:var(--text);font-family:'Jost',sans-serif;width:100%;}
.opt:hover{border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.04);}
.opt.selected{border-color:var(--gold);background:var(--gold-dim);}
.opt-icon{font-size:14px;flex-shrink:0;margin-top:3px;color:var(--gold);opacity:0.5;}
.opt-label{font-size:13px;font-weight:400;color:var(--text);display:block;margin-bottom:2px;}
.opt-sub{font-size:11px;color:var(--text-muted);font-style:italic;line-height:1.5;}
#loading-phase{display:none;text-align:center;padding:90px 24px;}
.spinner{width:44px;height:44px;border:1px solid var(--gold-border);border-top-color:var(--gold);border-radius:50%;margin:0 auto 26px;animation:spin 1.3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--text-soft);animation:breathe 2s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:0.38;}50%{opacity:1;}}
#output-phase{display:none;}
.out-tag{display:inline-block;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-border);padding:5px 13px;border-radius:20px;margin-bottom:12px;}
.s-num{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);opacity:0.45;margin-bottom:8px;}
.s-head{font-family:'Cormorant Garamond',serif;font-size:clamp(1.05rem,2.4vw,1.32rem);font-weight:300;color:var(--white);margin-bottom:12px;line-height:1.3;}
.s-body{font-size:13px;line-height:1.9;color:var(--text-soft);font-weight:300;}
.s-body strong{color:var(--text);font-weight:500;}
.s-body em{color:var(--gold-light);font-style:italic;}
.steps{list-style:none;margin-top:14px;display:flex;flex-direction:column;}
.steps li{display:flex;gap:18px;align-items:flex-start;padding:13px 0;border-bottom:1px solid rgba(201,168,76,0.06);font-size:12px;line-height:1.75;color:var(--text-soft);}
.steps li:last-child{border-bottom:none;}
.sn{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);opacity:0.45;flex-shrink:0;min-width:18px;}
.p-nodes{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;}
.pn{font-size:9px;letter-spacing:0.1em;padding:5px 13px;border-radius:2px;text-transform:uppercase;}
.pn.hi{background:rgba(201,168,76,0.14);color:var(--gold-light);border:1px solid rgba(201,168,76,0.28);}
.pn.mid{background:rgba(220,232,240,0.04);color:var(--text-soft);border:1px solid rgba(220,232,240,0.08);}
.pn.lo{background:transparent;color:var(--text-muted);border:1px solid rgba(220,232,240,0.04);}
.reframe{border-left:2px solid var(--gold);padding:15px 20px;margin-top:4px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;line-height:1.8;color:var(--text-soft);background:rgba(201,168,76,0.03);border-radius:0 3px 3px 0;}
.recon{border:1px solid rgba(201,168,76,0.18);border-radius:3px;padding:18px 22px;margin-bottom:18px;background:rgba(201,168,76,0.03);font-size:12px;line-height:1.75;color:var(--text-soft);}
.recon strong{display:block;font-family:'Cormorant Garamond',serif;font-size:0.98rem;color:var(--gold-light);font-style:italic;margin-bottom:5px;font-weight:400;}
.micro{margin-top:14px;display:flex;flex-direction:column;gap:9px;}
.mstep{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:rgba(6,17,31,0.45);border-left:2px solid var(--gold);font-size:12px;line-height:1.65;color:var(--text-soft);}
.feed-input{width:100%;background:rgba(6,17,31,0.55);border:1px solid var(--gold-border);border-radius:3px;color:var(--text);font-family:'Jost',sans-serif;font-weight:300;font-size:13px;line-height:1.8;padding:14px 16px;resize:none;min-height:90px;outline:none;transition:border-color 0.3s;letter-spacing:0.02em;margin-bottom:14px;}
.feed-input::placeholder{color:var(--text-muted);font-style:italic;}
.feed-input:focus{border-color:rgba(201,168,76,0.4);}
.feed-sent{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:var(--gold-light);text-align:center;padding:12px;display:none;}
.btn-reset{display:block;width:100%;text-align:center;padding:15px;margin-top:28px;border:1px solid rgba(201,168,76,0.12);border-radius:3px;background:transparent;color:var(--text-muted);font-family:'Jost',sans-serif;font-weight:400;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;transition:all 0.28s;}
.btn-reset:hover{border-color:var(--gold-border);color:var(--gold);}
footer{text-align:center;margin-top:56px;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-muted);opacity:0.4;}
@keyframes fup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){.wrap{padding:52px 18px 80px;}.card{padding:26px 22px;}h1{font-size:2.3rem;}.btn-gold{float:none;width:100%;justify-content:center;margin-top:16px;}}
</style>
</head>
<body>
<div class="bg"><div class="bg-g"></div><div class="bg-w"></div></div>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('pt')">PT</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<div class="wrap">
  <header>
    <p class="lab-tag" id="t-lab"></p>
    <h1 id="t-h1"></h1>
    <div class="divider"></div>
    <p class="subtitle" id="t-sub"></p>
  </header>

  <div id="input-phase">
    <div class="card">
      <p class="input-prompt" id="t-prompt"></p>
      <textarea id="user-input"></textarea>
      <div class="chips" id="chips"></div>
      <div class="cf"><button class="btn-gold" onclick="startDiagnosis()" id="t-btn-start"></button></div>
    </div>
  </div>

  <div id="diagnosis-phase">
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-box"></div>
    <div class="cf"><button class="btn-gold" id="next-btn" onclick="nextQ()" disabled></button></div>
  </div>

  <div id="loading-phase">
    <div class="spinner"></div>
    <p class="load-txt" id="t-loading"></p>
  </div>

  <div id="output-phase"></div>
  <footer id="t-footer"></footer>
</div>

<script>

    ],
    labels:{interpretation:'Interpretação',conceptual:'Conceitual',execution:'Execução',emotional:'Emocional'},
    content:{
      interpretation:{tag:'Falha de Interpretação',pt:'Seu cérebro não conseguiu decodificar o problema',pb:'Isso acontece quando o <strong>processamento semântico</strong> — a etapa que converte palavras em estrutura de problema — não ativa os esquemas certos. Não é falta de inteligência. É falta de prática em ler a linguagem específica da matemática.',cause:'O erro provavelmente ocorreu <em>antes de qualquer cálculo</em>. A questão pode ter usado vocabulário técnico ou estrutura indireta que seu sistema de leitura ainda não mapeou.',et:'Leitura matemática ativa',steps:['Leia o problema em voz alta','Identifique o que a questão te dá','Identifique o que ela pede','Reformule com suas palavras antes de escrever equações','Só então escolha o método'],strategy:'Pratique interpretar enunciados <strong>sem resolver</strong> — só leia e classifique. Com o tempo, ficará automático.',reframe:'Você não "errou matemática". Você errou na leitura do código. São habilidades diferentes — e essa responde rápido ao treino.'},
      conceptual:{tag:'Lacuna Conceitual',pt:'O fundamento mental ainda não estava consolidado',pb:'O <strong>esquema cognitivo</strong> para esse conceito existe — mas de forma frágil. Você pode ter visto o conteúdo, mas sob pressão a representação ainda falha.',cause:'Você tentou construir em cima de uma base que ainda não estava firme. O conceito foi exposto, mas não integrado.',et:'Construção em camadas',steps:['Identifique com precisão qual etapa falhou','Volte ao ponto mais básico que você domina','Construa a partir daí com exemplos simples','Explique o conceito em voz alta sem olhar nada','Só avance quando conseguir explicar, não só fazer'],strategy:'Use <strong>interleaving</strong>: misture esse conceito com outros já dominados. O cérebro consolida melhor quando precisa distinguir quando usar cada coisa.',reframe:'Lacunas conceituais não indicam limite — indicam onde uma etapa foi pulada. Você encontrou exatamente onde ir.'},

// ── FRUSTRATION ───────────────────────────────────────────
function isFrustrated(txt){
  return ['nada funciona','não adianta','desisti','odeio','nunca','frustrad','não consigo','tentei tudo','inútil','burro','burra','nothing works','frustrated','gave up','useless','hate','impossible','imposible','inútil','odio','siempre me equivoco','no puedo'].some(k=>txt.toLowerCase().includes(k));
}

// ── CLASSIFY ──────────────────────────────────────────────
function classify(){
  const a=state.answers;
  const s={interpretation:0,conceptual:0,execution:0,emotional:0};
  if(a.understanding==='no') s.interpretation+=3;
  if(a.understanding==='partial') s.interpretation+=1.5;
  if(a.concept==='no') s.conceptual+=3;
  if(a.concept==='partial') s.conceptual+=1.5;
  if(a.execution==='yes') s.execution+=3;
  if(a.execution==='both'){s.execution+=1.5;s.conceptual+=1;}
  if(a.emotion==='anxious') s.emotional+=3;
  if(a.emotion==='frustrated') s.emotional+=2;
  if(state.recon) s.emotional+=1.5;
  const primary=Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
  const active=Object.entries(s).filter(([,v])=>v>0).map(([k])=>k);
  return {scores:s,primary,active};
}

// ── FLOW ──────────────────────────────────────────────────
function startDiagnosis(){
  const v=document.getElementById('user-input').value.trim();
  if(!v){document.getElementById('user-input').focus();return;}
  state.input=v; state.answers={}; state.q=0; state.recon=isFrustrated(v);
  document.getElementById('input-phase').style.display='none';
  document.getElementById('diagnosis-phase').style.display='block';
  renderQ();
}

function pick(qid,val,el){
  state.answers[qid]=val;
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('next-btn').disabled=false;
}

function nextQ(){
  if(!state.answers[QIDS[state.q]]) return;
  state.q++;
  const qs=T[lang].qs;
  if(state.q<qs.length){renderQ();}
  else{
    document.getElementById('diagnosis-phase').style.display='none';
    document.getElementById('loading-phase').style.display='block';
    setTimeout(buildOutput,1800);
  }
}

function renderQ(){
  const qs=T[lang].qs; const d=T[lang];
  const q=qs[state.q]; const qid=QIDS[state.q];
  const isLast=state.q===qs.length-1;
  document.getElementById('prog-fill').style.width=((state.q/qs.length)*100)+'%';
  document.getElementById('next-btn').textContent=isLast?d.analyze:d.next;
  document.getElementById('next-btn').disabled=true;
  document.getElementById('q-box').innerHTML=`
    <div class="card">
      <p class="q-num">${String(state.q+1).padStart(2,'0')} / ${qs.length}</p>
      <p class="q-text">${q.q}</p>
      <p class="q-hint">${q.hint}</p>
      <div class="opts">
        ${q.opts.map(o=>`
          <button class="opt" onclick="pick('${qid}','${o.v}',this)">
            <span class="opt-icon">◈</span>
            <span><span class="opt-label">${o.l}</span><span class="opt-sub">${o.s}</span></span>
          </button>`).join('')}
      </div>
    </div>`;
}

// ── OUTPUT ────────────────────────────────────────────────
function buildOutput(){

  const {scores,primary,active}=classify();

  const nodes=Object.entries(d.labels).map(([k,label])=>{
    const s=scores[k];
    let cls='lo';
    if(k===primary)cls='hi';
    else if(active.includes(k))cls='mid';
    return `<span class="pn ${cls}">${label}</span>`;

  const recon=state.recon?`<div class="recon"><strong>${d.reconTitle}</strong>${d.reconBody}</div>`:'';

    :`<ul class="steps">${info.steps.map((s,i)=>`<li><span class="sn">${i+1}</span><span>${s}</span></li>`).join('')}</ul>`;

  out.innerHTML=`
    ${recon}
    <div class="card">
      <p class="s-num">${d.s[0]}</p>

    </div>

      <p class="s-num">${d.s[1]}</p>
      <p class="s-body">${info.cause}</p>
    </div>
    <div class="card">
      <p class="s-num">${d.s[2]}</p>
      <p class="s-head">${info.et}</p>
      ${stepsHTML}
    </div>
    <div class="card">
      <p class="s-num">${d.s[3]}</p>
      <p class="s-body">${info.strategy}</p>
    </div>
    <div class="card">
      <p class="s-num">${d.s[4]}</p>
      <div class="reframe">${info.reframe}</div>
    </div>
    <div class="card">
      <p class="input-prompt" style="font-size:1rem;margin-bottom:14px">${d.feedLabel}</p>
      <textarea class="feed-input" id="feed-txt" placeholder="${d.feedPh}"></textarea>
      <div class="cf"><button class="btn-gold" onclick="sendFeed()">${d.feedBtn}</button></div>
      <p class="feed-sent" id="feed-ok">${d.feedOk}</p>
    </div>
    <button class="btn-reset" onclick="resetApp()">${d.reset}</button>`;

  window.scrollTo({top:0,behavior:'smooth'});
}

// ── FEEDBACK ──────────────────────────────────────────────
async function sendFeed(){
  const msg=document.getElementById('feed-txt').value.trim();
  if(!msg) return;
  try{
    await fetch('https://formspree.io/f/xdkozpvq',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({message:msg,lang,pattern:classify().primary,email:'neurobia.lab@gmail.com'})
    });
  }catch(e){}
  document.getElementById('feed-txt').style.display='none';
  document.querySelector('#output-phase .btn-gold:last-of-type') && (document.querySelector('#output-phase .card:last-of-type .btn-gold').style.display='none');
  document.getElementById('feed-ok').style.display='block';
}

// ── RESET ─────────────────────────────────────────────────
function resetApp(){
  state.input='';state.answers={};state.q=0;state.recon=false;
  document.getElementById('user-input').value='';
  document.getElementById('output-phase').style.display='none';
  document.getElementById('output-phase').innerHTML='';
  document.getElementById('input-phase').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
